# MkDocs configuration for Tennis WIKI
# ============================================================================
# Builds a beautiful static documentation site from the Obsidian vault.
# Deploys to GitHub Pages automatically via .github/workflows/deploy.yml
# ============================================================================

site_name: 🎾 Tennis WIKI
site_description: Bách khoa toàn thư mở về quần vợt hiện đại — tiếng Việt
site_author: Henry Phạm

# The URL where the site will be hosted
# After you create the repo, change this to your real GitHub Pages URL:
#   https://henryPhamDuc.github.io/tennis-wiki/
site_url: https://henryPhamDuc.github.io/tennis-wiki/

# Use the directory 'docs/' as source (matches our converter output)
docs_dir: docs
site_dir: site

# Theme: Material (the best static site theme for documentation)
theme:
  name: material
  language: vi                     # Vietnamese UI strings
  features:
    - navigation.tabs              # Top-level section tabs
    - navigation.tabs.sticky       # Sticky tabs when scrolling
    - navigation.sections          # Left sidebar sections
    - navigation.expand            # Auto-expand sections
    - navigation.top               # Back-to-top button
    - navigation.indexes           # Section index pages
    - navigation.tracking          # URL fragment updates as you scroll
    - toc.follow                   # Right TOC follows scroll
    - search.suggest               # Search suggestions
    - search.highlight             # Highlight matches in pages
    - search.share                 # Share search results
    - content.code.copy            # Copy button on code blocks
    - content.tabs.link            # Sync tabbed content
    - content.tooltips             # Hover tooltips for links
  palette:
    # Light mode: grass court green
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Dark mode
    # Dark mode: clay court tones
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/tennis

# Plugins
plugins:
  - search:
      lang: vi                     # Vietnamese full-text search
      separator: '[\s\-\.\_]+'

# Markdown extensions
markdown_extensions:
  # Standard
  - abbr                         # Abbreviations
  - admonition                   # !!! note boxes
  - attr_list                    # {: .class} syntax
  - def_list                     # Definition lists
  - footnotes                     # [^1] footnotes
  - md_in_html                   # Use Markdown inside HTML
  - tables                       # GFM tables
  - toc:                         # Table of contents
      permalink: true            # Anchor link on headings
      toc_depth: 3
  # Pymdown extensions (better rendering)
  - pymdownx.details             # Collapsible admonitions
  - pymdownx.superfences:        # Better fenced code blocks
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:             # === TabX content
      alternate_style: true
  - pymdownx.highlight:          # Syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite        # Inline syntax highlighting
  - pymdownx.snippets            # Snippet includes
  - pymdownx.tasklist:           # - [ ] checkboxes
      custom_checkbox: true
  - pymdownx.emoji:              # :smile: shortcodes
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.caret               # ^^insert^^ mark
  - pymdownx.tilde               # ~~strike~~
  - pymdownx.mark                # ==highlight==
  - pymdownx.keys                # Ctrl+key
  - pymdownx.smartsymbols        # Pretty quotes/dashes
  - pymdownx.critic              # CriticMarkup edits
  - pymdownx.betterem            # Smarter *emphasis*
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.magiclink:          # Auto-link bare URLs

